<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">SillyBunny badge</title>
  <desc id="desc">A dark badge with a warm outline and a stylized bunny face.</desc>
  <defs>
    <linearGradient id="sbBadgeBg" x1="32" x2="224" y1="24" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f1b15"/>
      <stop offset="0.5" stop-color="#171411"/>
      <stop offset="1" stop-color="#0d1310"/>
    </linearGradient>
    <linearGradient id="sbBadgeRing" x1="56" x2="206" y1="52" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd28a"/>
      <stop offset="0.55" stop-color="#ff9b63"/>
      <stop offset="1" stop-color="#d46847"/>
    </linearGradient>
    <linearGradient id="sbFur" x1="87" x2="170" y1="58" y2="193" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff4e2"/>
      <stop offset="1" stop-color="#f2dbc3"/>
    </linearGradient>
    <linearGradient id="sbInnerEar" x1="98" x2="153" y1="52" y2="121" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffcfb6"/>
      <stop offset="1" stop-color="#f4a283"/>
    </linearGradient>
    <radialGradient id="sbGlow" cx="128" cy="62" r="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffcb7d" stop-opacity="0.26"/>
      <stop offset="0.72" stop-color="#ffcb7d" stop-opacity="0"/>
    </radialGradient>
    <filter id="sbShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="60" fill="#080d0b"/>
  <rect x="12" y="12" width="232" height="232" rx="52" fill="url(#sbBadgeBg)" stroke="url(#sbBadgeRing)" stroke-width="8"/>
  <circle cx="128" cy="86" r="82" fill="url(#sbGlow)"/>

  <g filter="url(#sbShadow)">
    <circle cx="128" cy="136" r="80" fill="#111715" stroke="url(#sbBadgeRing)" stroke-width="8"/>

    <ellipse cx="98" cy="77" rx="19" ry="49" transform="rotate(-12 98 77)" fill="url(#sbFur)"/>
    <ellipse cx="158" cy="77" rx="19" ry="49" transform="rotate(12 158 77)" fill="url(#sbFur)"/>
    <ellipse cx="101" cy="80" rx="9" ry="34" transform="rotate(-12 101 80)" fill="url(#sbInnerEar)"/>
    <ellipse cx="155" cy="80" rx="9" ry="34" transform="rotate(12 155 80)" fill="url(#sbInnerEar)"/>

    <circle cx="128" cy="139" r="52" fill="url(#sbFur)"/>
    <circle cx="103" cy="149" r="20" fill="url(#sbFur)"/>
    <circle cx="153" cy="149" r="20" fill="url(#sbFur)"/>
    <ellipse cx="128" cy="175" rx="30" ry="22" fill="#fff8ee"/>

    <ellipse cx="111" cy="140" rx="5" ry="7" fill="#342720"/>
    <ellipse cx="145" cy="140" rx="5" ry="7" fill="#342720"/>
    <path d="M128 149c-5 0-9 4-9 9 0 2 1 4 2 5l7 6 7-6c1-1 2-3 2-5 0-5-4-9-9-9Z" fill="#e47a58"/>
    <path d="M128 169v10" fill="none" stroke="#3f3229" stroke-linecap="round" stroke-width="4"/>
    <path d="M128 179c-8 0-14 4-18 10" fill="none" stroke="#3f3229" stroke-linecap="round" stroke-width="4"/>
    <path d="M128 179c8 0 14 4 18 10" fill="none" stroke="#3f3229" stroke-linecap="round" stroke-width="4"/>
  </g>
</svg>
