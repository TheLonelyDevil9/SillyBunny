                                  - checkbox "Compact Worlds/Lorebooks Top Bar" [checked] [ref=e1204] [cursor=pointer]
                                - generic [ref=e1205]: Make the top fields in Worlds/Lorebooks more compact by reducing header padding and entry spacing
                          - generic [ref=e1206]:
                            - heading "Advanced Custom CSS " [level=4] [ref=e1209] [cursor=pointer]:
